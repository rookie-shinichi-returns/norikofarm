{% extends 'plant\base.html' %}
{% load static %}

{% block content %}

<div class="signup-container">
    <h2>サインアップ</h2>
    <form action="{% url 'plant:signup' %}" method="post">{% csrf_token %}
        <div class="form-group">
            <label>メールアドレス</label>
            {{ form.email }}
            {{ form.email.errors }}
        </div>
        <div class="form-group">
            <label>パスワード</label>
            {{ form.password1 }}
            {{ form.password1.errors }}
        </div>
        <div class="form-group">
            <label>パスワード（確認）</label>
            {{ form.password2 }}
            {{ form.password2.errors }}
        </div>
        <div class="toggle-group">
            <input type="checkbox" id="toggle-password">
            <label for="toggle-password">パスワードを表示する</label>
        </div>
        <button type="submit" class="btn-submit">登録する</button>
    </form>
</div>

{% endblock %}

{% block extrajs %}
    <script src="{% static 'js\confirmpassword.js' %}"></scripts>
{% endblock %}

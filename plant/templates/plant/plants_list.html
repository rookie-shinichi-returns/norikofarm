<div class="plant-list">
    {% for plant in plants %}
    <div class="plant">    
        <a href="{% url 'plant:plants_detail' plant.id %}"><img src="{{ plant.image.url }}"></a>
        <a href="{% url 'plant:users_detail' plant.user.id %}">{{ plant.name }}</a>
    </div>       
    {% endfor %}
</div>
